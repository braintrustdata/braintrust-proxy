name: Sync new models

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:
    inputs:
      providers:
        description: "Space-separated provider allowlist"
        required: false
        default: "fireworks openai anthropic baseten xai"

concurrency:
  group: sync-models
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      DEFAULT_PROVIDERS: "fireworks openai anthropic baseten xai"
      BRANCH_NAME: chore/sync-new-models
      COMMIT_MESSAGE: "chore: sync new models"
      PR_TITLE: "chore: sync new models"
      PR_BODY: "Automated sync of model metadata and newly available models from the approved provider allowlist."

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 10.33.0

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync selected providers
        run: |
          set -euo pipefail

          providers="${{ github.event.inputs.providers }}"
          if [ -z "$providers" ]; then
            providers="${DEFAULT_PROVIDERS}"
          fi

          echo "Syncing providers: $providers"

          for provider in $providers; do
            pnpm dlx tsx packages/proxy/scripts/sync_models.ts update-models --provider "$provider" --write
            pnpm dlx tsx packages/proxy/scripts/sync_models.ts add-models --provider "$provider" --write
          done

      - name: Collect changed model ids
        id: changed_models
        run: |
          set -euo pipefail

          git show HEAD:packages/proxy/schema/model_list.json > "$RUNNER_TEMP/model_list.head.json"

          node - "$RUNNER_TEMP/model_list.head.json" "packages/proxy/schema/model_list.json" "$RUNNER_TEMP/sync-model-changed.json" <<'NODE'
          const fs = require("fs");

          const [headPath, afterPath, outputPath] = process.argv.slice(2);
          const before = JSON.parse(fs.readFileSync(headPath, "utf8"));
          const after = JSON.parse(fs.readFileSync(afterPath, "utf8"));
          const changedModels = Object.keys(after).filter(
            (name) => JSON.stringify(before[name]) !== JSON.stringify(after[name]),
          );

          fs.writeFileSync(outputPath, JSON.stringify(changedModels, null, 2) + "\n");
          NODE

          count="$(node -e 'const fs=require("fs"); const changedModels=JSON.parse(fs.readFileSync(process.argv[1], "utf8")); process.stdout.write(String(changedModels.length));' "$RUNNER_TEMP/sync-model-changed.json")"
          echo "count=$count" >> "$GITHUB_OUTPUT"

      - name: Enrich changed model metadata with Claude Code
        if: ${{ steps.changed_models.outputs.count != '0' }}
        uses: anthropics/claude-code-action@df37d2f0760a4b5683a6e617c9325bc1a36443f6 # v1.0.75
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ github.token }}
          show_full_output: "true"
          display_report: "true"
          timeout_minutes: "15"
          claude_args: |
            --model claude-opus-4-6
            --max-turns 80
            --allowedTools "Read,Glob,Grep,LS,WebSearch,WebFetch,Edit,Write"
            --disallowedTools "Bash,MultiEdit,Replace,NotebookEditCell,mcp__github__create_issue,mcp__github__create_issue_comment,mcp__github__update_issue,mcp__github__create_pr,mcp__github__create_or_update_file,mcp__github__delete_file,mcp__github_file_ops__commit_files,mcp__github_file_ops__delete_files"
          prompt: |
            # Goal

            After the deterministic `sync_models.ts` update/add passes finish, enrich the model entries changed on this branch by this run with verified `displayName` metadata and, only when appropriate, verified `parent` metadata.

            # Inputs

            - Changed model id file: `${{ runner.temp }}/sync-model-changed.json`
            - Changed model count: `${{ steps.changed_models.outputs.count }}`

            # Files to inspect first

            - `packages/proxy/schema/model_list.json`
            - `packages/proxy/schema/models.ts`
            - `packages/proxy/scripts/sync_models.ts`
            - `.github/workflows/sync-models.yaml`

            # What to do

            1. Read the changed model id file and only work on those exact model ids.
            2. Verify `displayName` and `parent` from official provider documentation or official provider APIs.
            3. Update only `packages/proxy/schema/model_list.json`.
            4. Preserve existing JSON formatting, field order, and neighboring naming conventions.
            5. Add a human-friendly `displayName` when it is missing, or correct it if the existing value is clearly inconsistent with official provider naming.
            6. Attempt to set `parent` only when the model is clearly not a base model and official sources verify the relationship.
            7. The main parent case to look for is a model id that contains an embedded date or other explicit version snapshot which points to a stable alias.
            8. If the model is a location-scoped variant such as `global`, `us`, `eu`, `apac`, or similar and the official source clearly ties it to a non-location parent model, you may set `parent` for that case too.
            9. Leave `parent` unset for base models or when the relationship cannot be verified confidently from official sources.
            10. If a field cannot be verified confidently from official sources, leave it unset instead of guessing.

            # Constraints

            - Do not edit any file other than `packages/proxy/schema/model_list.json`.
            - Use official provider sources only for metadata decisions.
            - Do not invent placeholder values.

      - name: Check expected files only
        id: changes
        run: |
          set -euo pipefail

          if [ -z "$(git status --short)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          unexpected=$(git status --porcelain | awk '{print $2}' | grep -vE '^(packages/proxy/schema/model_list\.json|packages/proxy/schema/index\.ts)$' || true)
          if [ -n "$unexpected" ]; then
            echo "Unexpected files modified:"
            echo "$unexpected"
            exit 1
          fi

          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Build proxy package
        if: ${{ steps.changes.outputs.changed == 'true' }}
        run: pnpm --filter @braintrust/proxy run build

      - name: Validate model schema
        if: ${{ steps.changes.outputs.changed == 'true' }}
        run: pnpm exec vitest run packages/proxy/schema/models.test.ts packages/proxy/schema/index.test.ts packages/proxy/scripts/sync_models.test.ts

      - name: Create PR
        if: ${{ steps.changes.outputs.changed == 'true' }}
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7.0.11
        with:
          token: ${{ github.token }}
          base: main
          branch: ${{ env.BRANCH_NAME }}
          commit-message: ${{ env.COMMIT_MESSAGE }}
          title: ${{ env.PR_TITLE }}
          body: ${{ env.PR_BODY }}
          labels: auto-sync
          signoff: false
